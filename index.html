<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de las Monedas del Amor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://i.imgur.com/ZxInKJc.jpg");
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: white;
            text-shadow: 0 0 5px black;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #contenedor {
            display: grid;
            grid-template-columns: repeat(5, 80px);
            gap: 20px;
            margin-top: 40px;
        }

        .moneda {
            width: 70px;
            height: 70px;
            background: gold;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: black;
            cursor: pointer;
            border: 3px solid #d4af37;
            box-shadow: 0 0 10px black;
            transition: 0.3s;
        }

        .moneda:hover {
            transform: scale(1.15);
            background: rgb(255, 230, 120);
        }

        #mensaje {
            margin-top: 30px;
            font-size: 24px;
            min-height: 50px;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <h1>🎇 Monedas del Amor en la Noche 🎇</h1>
    <p>Toca una moneda para descubrir tu destino 💞</p>

    <div id="contenedor"></div>
    <div id="mensaje"></div>

    <script>
        const mensajesLindos = [
            "Eres lo más bonito de mis días.",
            "Tu sonrisa ilumina mis noches.",
            "Eres mi paz en medio del caos.",
            "Desde que llegaste, todo es mejor.",
            "Mi mundo tiene sentido contigo.",
        ];

        const penitencias = [
            "Penitencia: me debes un abrazo fuerte.",
            "Penitencia: me debes un beso.",
            "Penitencia: me debes un detalle bonito.",
            "Penitencia: me debes una foto tuya.",
            "Penitencia: me debes una cita romántica."
        ];

        const todas = [...mensajesLindos, ...penitencias];

        // Mezclar las 10 opciones
        todas.sort(() => Math.random() - 0.5);

        const contenedor = document.getElementById("contenedor");
        const mensaje = document.getElementById("mensaje");

        for (let i = 0; i < 10; i++) {
            const moneda = document.createElement("div");
            moneda.classList.add("moneda");
            moneda.textContent = "💰";

            moneda.onclick = () => {
                mensaje.innerHTML = todas[i].includes("Penitencia")
                    ? `<span style='color: red; font-weight: bold;'>${todas[i]}</span>`
                    : `<span style='color: lightgreen;'>${todas[i]}</span>`;

                moneda.style.transform = "scale(1.2)";
                moneda.style.background = "silver";
                moneda.style.pointerEvents = "none";
            };

            contenedor.appendChild(moneda);
        }
    </script>

</body>
</html>

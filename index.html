                      <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carro del Amor</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(to bottom, #87CEFA, #ffffff);
        font-family: Arial, sans-serif;
    }
    #carro {
        position: absolute;
        bottom: 20px;
        left: 50%;
        width: 80px;
        transform: translateX(-50%);
    }
    .corazon {
        position: absolute;
        width: 40px;
        animation: caer 4s linear infinite;
    }
    @keyframes caer {
        0% { top: -50px; }
        100% { top: 100vh; }
    }
    #puntos {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 25px;
        font-weight: bold;
        color: #ff0066;
    }
    #mensaje {
        position: absolute;
        top: 50px;
        left: 10px;
        font-size: 20px;
        color: #d00055;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="puntos">Puntos: 0</div>
<div id="mensaje"></div>

<img id="carro" src="https://i.imgur.com/4T5CwCx.png">

<script>
    let carro = document.getElementById("carro");
    let puntos = 0;
    let mensaje = document.getElementById("mensaje");

    let frases = [
        "Eres mi destino ❤️",
        "Te amo demasiado 🚗💘",
        "Tu amor me guía siempre ✨",
        "Conduces mi corazón 💖",
        "Eres mi ruta favorita 💞"
    ];

    // Movimiento del carro
    document.addEventListener("mousemove", (e) => {
        carro.style.left = e.clientX - 40 + "px";
    });

    // Crear corazones
    function crearCorazon() {
        let corazon = document.createElement("img");
        corazon.src = "https://i.imgur.com/ZKQ7jvM.png";
        corazon.classList.add("corazon");
        corazon.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(corazon);

        let caer = setInterval(() => {
            let corazonRect = corazon.getBoundingClientRect();
            let carroRect = carro.getBoundingClientRect();

            // Colisión
            if (
                corazonRect.bottom >= carroRect.top &&
                corazonRect.left < carroRect.right &&
                corazonRect.right > carroRect.left
            ) {
                puntos++;
                document.getElementById("puntos").innerText = "Puntos: " + puntos;
                mensaje.innerText = frases[Math.floor(Math.random() * frases.length)];
                corazon.remove();
                clearInterval(caer);
            }

            // Si desaparece abajo
            if (corazonRect.top > window.innerHeight) {
                corazon.remove();
                clearInterval(caer);
            }
        }, 50);
    }

    setInterval(crearCorazon, 1200);
</script>

</body>
</html>

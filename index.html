<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de las Tres Cajas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://i.imgur.com/bzrFzvf.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            padding-top: 40px;
            color: white;
            text-shadow: 0 0 5px black;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .box {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.85);
            color: black;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
            border: 3px solid pink;
        }

        .box:hover {
            background: rgba(255, 200, 200, 0.9);
            transform: scale(1.07);
        }

        #mensaje {
            margin-top: 35px;
            font-size: 22px;
            font-weight: bold;
            min-height: 40px;
        }

        #ronda {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Juego Romántico de las Tres Cajas</h1>
    <div id="ronda"></div>

    <div class="container">
        <div class="box" onclick="abrirCaja(1)">Caja 1</div>
        <div class="box" onclick="abrirCaja(2)">Caja 2</div>
        <div class="box" onclick="abrirCaja(3)">Caja 3</div>
    </div>

    <div id="mensaje"></div>

    <script>
        let rondaActual = 1;
        const rondasTotales = 10;

        const mensajes = [
            "Eres mi lugar favorito.",
            "Mi corazón sonríe cuando piensa en ti.",
            "Eres mi casualidad más bonita.",
            "Todo es mejor contigo.",
            "Tu amor es mi suerte.",
            "Eres mi sueño hecho realidad.",
            "En mis días grises, eres mi color.",
            "Mi vida es más bonita desde que estás en ella.",
            "Eres mi felicidad diaria.",
            "Te quiero más de lo que puedo decir."
        ];

        let cajaGanadora = generarCaja();
        mostrarRonda();

        function generarCaja() {
            return Math.floor(Math.random() * 3) + 1;
        }

        function mostrarRonda() {
            document.getElementById("ronda").innerHTML =
                `Ronda: ${rondaActual} / ${rondasTotales}`;
        }

        function reiniciarJuego() {
            rondaActual++;
            if (rondaActual > rondasTotales) {
                document.getElementById("mensaje").innerHTML =
                    "🎉💖 ¡Has completado las 10 rondas de amor!";
                return;
            }

            cajaGanadora = generarCaja();
            mostrarRonda();
            document.getElementById("mensaje").innerHTML = "";
        }

        function abrirCaja(num) {
            const mensaje = document.getElementById("mensaje");

            if (num === cajaGanadora) {
                mensaje.innerHTML = `💖✨ ${mensajes[rondaActual - 1]}`;
                mensaje.style.color = "lightgreen";
            } else {
                mensaje.innerHTML = "❌ Caja vacía… pero el amor siempre vuelve.";
                mensaje.style.color = "red";
            }

            setTimeout(reiniciarJuego, 1500);
        }
    </script>

</body>
</html>

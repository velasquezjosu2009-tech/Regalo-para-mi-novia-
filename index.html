<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Te Amo</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(to top, #ff9ab9, #ffd6e8);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        overflow: hidden;
        font-family: "Century Gothic", sans-serif;
    }

    /* Pareja abrazada estilo silueta */
    .pareja {
        position: relative;
        width: 160px;
        height: 260px;
        animation: caminar 3.5s infinite linear;
    }

    .chico, .chica {
        position: absolute;
        bottom: 0;
        width: 80px;
        height: 250px;
        background: #2b2b2b;
        border-radius: 40px;
    }

    .chico {
        left: 0;
        transform: rotate(-6deg);
    }

    .chica {
        right: 0;
        transform: rotate(6deg);
    }

    /* Corazón */
    .corazon {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 60px;
        animation: latir 1.2s infinite ease-in-out;
    }

    @keyframes latir {
        0% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.3); }
        100% { transform: translateX(-50%) scale(1); }
    }

    /* Animación de caminar */
    @keyframes caminar {
        0% { transform: translateX(-50px); }
        100% { transform: translateX(50px); }
    }

    /* Te amo */
    .teamo {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 40px;
        color: #ffffff;
        text-shadow: 0 0 20px #ff006a;
        opacity: 0;
        animation: aparecer 3s forwards;
        animation-delay: 1.5s;
    }

    @keyframes aparecer {
        0% { opacity: 0; transform: translate(-50%, 20px); }
        100% { opacity: 1; transform: translate(-50%, 0); }
    }
</style>
</head>
<body>

<div class="corazon">❤️</div>

<div class="pareja">
    <div class="chico"></div>
    <div class="chica"></div>
</div>

<div class="teamo">Te amo</div>

</body>
</html>

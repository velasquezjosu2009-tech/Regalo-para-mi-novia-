<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Mi Novia 💖</title>
    <style>
        body {
            background: linear-gradient(to bottom right, #ff9a9e, #fecfef);
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #fff;
            padding: 40px;
        }
        h1 {
            font-size: 40px;
            margin-top: 20px;
            text-shadow: 2px 2px 5px #000;
        }
        p {
            font-size: 22px;
            margin: 20px auto;
            width: 80%;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .heart {
            font-size: 80px;
            animation: latido 1.3s infinite;
        }
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="heart">❤️</div>
    <h1>Para ti, mi amor</h1>

    <div class="card">
        <p>
            Hoy quiero recordarte algo hermoso:<br>
            Eres mi bendición, mi alegría, mi paz y mi razón favorita.<br>
            Cada día que te elijo… también me elijo a mí, porque tú eres mi mejor versión.
        </p>

        <p>
            Gracias por existir, por estar, por ser tú.<br>
            Te amo con cada latido. 💘
        </p>
    </div>
</body>
</html>

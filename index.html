                <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pingu Latidor</title>

<style>
body {
    margin: 0;
    background: #0a0a2a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Contenedor general */
.container {
    position: relative;
    width: 350px;
}

/* Imagen base */
.pingu {
    width: 100%;
    display: block;
    position: relative;
    z-index: 10;
}

/* Corazón latiendo */
.corazon {
    position: absolute;
    top: 160px;  
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    animation: latir 1s infinite ease-in-out;
}

@keyframes latir {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.12); }
    100% { transform: translateX(-50%) scale(1); }
}

/* Animación del beso */
.beso {
    position: absolute;
    font-size: 40px;
    top: 220px; 
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: beso 2s infinite ease-out;
}

@keyframes beso {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -40px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -120px) scale(1.2); }
}
</style>

</head>
<body>

<div class="container">
    <!-- Reemplaza esta ruta por tu imagen -->
    <img src="pingu.png" class="pingu">

    <!-- Corazón que late -->
    <img src="corazon.png" class="corazon">

    <!-- Beso saliendo -->
    <div class="beso">💋</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego de Carro</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=400&q=80') center/cover; display: block; }
    </style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let car = { x: 180, y: 500, width: 50, height: 90, speed: 5 };
let obstacles = [];
let gameOver = false;

const carImg = new Image();
carImg.src = "https://cdn.pixabay.com/photo/2016/12/06/09/31/ferrari-1880381_1280.jpg"; // Ferrari PNG

const logImg = new Image();
logImg.src = "https://cdn.pixabay.com/photo/2013/07/12/15/40/log-150791_1280.png"; // Tronco PNG

function createObstacle() {
    let x = Math.random() * 350;
    obstacles.push({ x, y: -100, width: 60, height: 60, speed: 4 });
}

function resetGame() {
    obstacles = [];
    car.x = 180;
    gameOver = false;
}

setInterval(createObstacle, 1200);

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' && car.x > 0) car.x -= car.speed;
    if (e.key === 'ArrowRight' && car.x < canvas.width - car.width) car.x += car.speed;
});

function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(carImg, car.x, car.y, car.width, car.height);

    for (let o of obstacles) {
        ctx.drawImage(logImg, o.x, o.y, o.width, o.height);
        o.y += o.speed;

        if (
            car.x < o.x + o.width &&
            car.x + car.width > o.x &&
            car.y < o.y + o.height &&
            car.y + car.height > o.y
        ) {
            gameOver = true;
            alert("¡Te chocaste! Reiniciando...");
            resetGame();
        }
    }

    obstacles = obstacles.filter(o => o.y < 650);

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>

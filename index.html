<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de las Tres Cajas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .box {
            width: 120px;
            height: 120px;
            background: #ddd;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
            border: 2px solid #aaa;
        }

        .box:hover {
            background: #ccc;
            transform: scale(1.05);
        }

        #mensaje {
            margin-top: 40px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Juego de las Tres Cajas</h1>

    <div class="container">
        <div class="box" onclick="abrirCaja(1)">Caja 1</div>
        <div class="box" onclick="abrirCaja(2)">Caja 2</div>
        <div class="box" onclick="abrirCaja(3)">Caja 3</div>
    </div>

    <div id="mensaje"></div>

    <script>
        const cajaGanadora = Math.floor(Math.random() * 3) + 1;

        function abrirCaja(numero) {
            const mensaje = document.getElementById("mensaje");

            if (numero === cajaGanadora) {
                mensaje.innerHTML = "🎉💌 ¡Encontraste el mensaje oculto!<br>“Eres la razón por la que sonrío sin motivo.”";
                mensaje.style.color = "green";
            } else {
                mensaje.innerHTML = "❌ Esta caja está vacía. Intenta de nuevo.";
                mensaje.style.color = "red";
            }
        }
    </script>

</body>
</html>

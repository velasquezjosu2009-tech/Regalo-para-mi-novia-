              <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avión Mensaje de Amor</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#7ecbff, #c9eaff);
        font-family: Arial, sans-serif;
    }

    /* Sol */
    .sun {
        position: absolute;
        top: 50px;
        right: 60px;
        width: 140px;
        height: 140px;
        background: yellow;
        border-radius: 50%;
        box-shadow: 0 0 40px yellow;
        animation: brillar 3s infinite alternate ease-in-out;
    }

    @keyframes brillar {
        from { transform: scale(1); }
        to { transform: scale(1.15); }
    }

    /* Avión */
    .avion {
        position: absolute;
        top: 45%;
        left: -200px;
        width: 180px;
        animation: volar 10s linear infinite;
        z-index: 5;
    }

    @keyframes volar {
        0% { transform: translateX(0); }
        100% { transform: translateX(140vw); }
    }

    /* Humo del mensaje */
    .humo {
        position: absolute;
        top: 50%;
        left: -300px;
        font-size: 55px;
        font-weight: bold;
        color: white;
        text-shadow: 4px 4px 8px #3f3f3f;
        letter-spacing: 8px;
        animation: escribir 10s linear infinite;
        white-space: nowrap;
    }

    @keyframes escribir {
        0% { transform: translateX(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateX(150vw); opacity: 1; }
    }
</style>

</head>
<body>

    <!-- Sol bonito animado -->
    <div class="sun"></div>

    <!-- Avión PNG (puedes cambiarlo si quieres otro estilo) -->
    <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" class="avion">

    <!-- Mensaje del humo -->
    <div class="humo">TE AMO MUCHO ❤️</div>

</body>
</html>
